{% extends 'layouts/base_app.html' %}

{% block title %}{{ titulo }} - Materias{% endblock %}

{% block content %}
<h2>{{ titulo }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
    <a href="{% url 'core:lista_materias' %}">Cancelar</a>
</form>
{% endblock %}
