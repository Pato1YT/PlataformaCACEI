{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Iniciar sesión - Se'si Eskani{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="auth-body">

    <div class="auth-logos">
        <img src="{% static 'img/logo_tecnm.png' %}" alt="TecNM" class="auth-logo auth-logo--left">
        <img src="{% static 'img/logo_itsh.png' %}" alt="ITSH" class="auth-logo auth-logo--right">
    </div>

    <main class="auth-main">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
