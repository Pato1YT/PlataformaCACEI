{% extends 'layouts/base_app.html' %}

{% block title %}{{ titulo }} - Se'si Eskani{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="dashboard__header">
        <div>
            <h2 class="dashboard__title">{{ titulo }}</h2>
            <p class="dashboard__subtitle">
                Completa los datos del docente. La contraseña temporal se generará automáticamente.
            </p>
        </div>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            {{ form.as_p }}
        </div>

        <button type="submit" class="course-card__button" style="max-width: 220px; font-weight: 700;">
            Guardar
        </button>
        <a href="{% url 'core:lista_usuarios' %}" class="dashboard__subtitle" style="margin-left: 16px; text-decoration: none;">
            Cancelar
        </a>
    </form>
</div>
{% endblock %}
