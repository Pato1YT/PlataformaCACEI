{% extends 'layouts/base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h2>{{ titulo }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
    <a href="{% url 'core:lista_atributos' %}">Cancelar</a>
</form>
{% endblock %}
