{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Iniciar sesión - Se'si Eskani{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="auth-body">

    <!-- Logos laterales -->
    <div class="auth-logos">
        <img src="{% static 'img/logo_tecnm.png' %}" alt="TecNM" class="auth-logo auth-logo--left">
        <img src="{% static 'img/logo_itsh.png' %}" alt="ITSH" class="auth-logo auth-logo--right">
    </div>

    <!-- Contenido centrado -->
    <main class="auth-main">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
