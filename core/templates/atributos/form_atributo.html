{% extends 'layouts/base_app.html' %}

{% block title %}{{ titulo }} - Se'si Eskani{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="dashboard__header">
        <div>
            <h2 class="dashboard__title">{{ titulo }}</h2>
            <p class="dashboard__subtitle">Completa los datos del atributo de egreso.</p>
        </div>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            {{ form.as_p }}
        </div>
        <button type="submit" class="course-card__button" style="max-width: 220px;">
            Guardar
        </button>
        <a href="{% url 'core:lista_atributos' %}" class="dashboard__subtitle" style="margin-left: 16px;">
            Cancelar
        </a>
    </form>
</div>
{% endblock %}
