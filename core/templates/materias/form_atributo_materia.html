{% extends 'layouts/base_app.html' %}

{% block title %}{{ titulo }} - Se'si Eskani{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="dashboard__header">
        <div>
            <h2 class="dashboard__title">{{ titulo }}</h2>
            <p class="dashboard__subtitle">
                {{ materia.clave }} - {{ materia.nombre }}
            </p>
        </div>
    </div>

    <div class="table-wrapper" style="padding:24px; max-width:900px;">
        <form method="post">
            {% csrf_token %}

            <div>
                <label style="display:block; margin-bottom:6px; font-weight:600;">Atributo de egreso</label>
                <input type="text"
                    class="form-control"
                    value="{{ relacion.atributo_egreso.codigo }} - {{ relacion.atributo_egreso.nombre }}"
                    disabled>
            </div>

            <div>
                <label style="display:block; margin-bottom:6px; font-weight:600;">Nivel de aporte</label>
                {{ form.nivel_aporte }}
                {{ form.nivel_aporte.errors }}
            </div>

            <div style="display:flex; gap:10px; margin-top:24px; flex-wrap:wrap;">
                <button type="submit" class="course-card__button" style="max-width:220px;">
                    Guardar
                </button>

                <a href="{% url 'core:gestionar_atributos_materia' materia.pk %}"
                   class="course-card__button"
                   style="max-width:220px; text-align:center; text-decoration:none; display:inline-block; background-color:#64748b;">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
